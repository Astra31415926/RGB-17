    <style>
        :root {
            --r-color: #FF004D;
            --g-color: #00FF41;
            --b-color: #0088FF;
            --bg-color: #050505;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden;
            transition: background 0.5s;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        textarea {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.4);
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .logo-q { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .logo-r { color: var(--r-color); text-shadow: 0 0 15px var(--r-color); }
        .logo-g { color: var(--g-color); text-shadow: 0 0 15px var(--g-color); }
        .logo-b { color: var(--b-color); text-shadow: 0 0 15px var(--b-color); }

        .scan-line { 
            position: absolute; left: 0; right: 0; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--g-color), transparent); 
            box-shadow: 0 0 15px var(--g-color); 
            top: 0; z-index: 20;
            opacity: 0;
            display: none;
        }
        
        .scan-active .scan-line {
            display: block;
            opacity: 1;
            animation: scanMove 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes scanMove { 
            0% { top: 0%; opacity: 1; } 
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
        
        @keyframes flash { 
            0% { opacity: 0; } 
            20% { opacity: 0.9; } 
            100% { opacity: 0; } 
        }
        .flash-anim { animation: flash 0.4s ease-out; }

        .indicator { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: #222; 
            transition: all 0.3s; 
        }
        .active-r { background: var(--r-color); box-shadow: 0 0 12px var(--r-color); }
        .active-g { background: var(--g-color); box-shadow: 0 0 12px var(--g-color); }
        .active-b { background: var(--b-color); box-shadow: 0 0 12px var(--b-color); }
        
        .dropdown-menu { 
            transform: translateY(-10px); opacity: 0; visibility: hidden; 
            transition: all 0.2s ease; 
        }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        
        .modal-overlay { 
            opacity: 0; visibility: hidden; transition: all 0.3s ease; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }

        /* Viewfinder States */
        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: rgba(255,255,255,0.2);
            border-width: 1px;
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 1px solid; border-left: 1px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 1px solid; border-right: 1px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 1px solid; border-left: 1px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 1px solid; border-right: 1px solid; border-radius: 0 0 8px 0; }
        
        /* State A: Searching */
        .searching .corner { 
            border-color: rgba(255,255,255,0.2); 
            border-width: 1px; 
        }

        /* State B: Tracking (Base Detection) */
        .tracking .corner { 
            border-color: rgba(255,255,255,0.6); 
            border-width: 2px;
            animation: pulse 2s infinite ease-in-out;
        }

        /* State C: Progress (1-2 Channels Found) */
        .progress .corner { 
            border-color: #FFD700; /* Yellow/Gold */
            border-width: 3px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: pulse 0.8s infinite ease-in-out; /* Faster pulse */
        }

        @keyframes pulse { 
            0% { opacity: 0.5; transform: scale(1); } 
            50% { opacity: 1; transform: scale(1.05); } 
            100% { opacity: 0.5; transform: scale(1); } 
        }
        
        .mode-camera .input-section { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .mode-camera .central-block { height: 70vh; }
        
        .input-section { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .social-link { opacity: 0.5; transition: opacity 0.3s; }

<script>
// RGB-11 Fixed & Improved Scanner v2.4 — Final Fix
// 1. Fixed Gallery Scan: Removed dependency on 'scanning' flag for processing logic.
// 2. Fixed Success Logic: Split handling for Camera (capture frame) vs File (already has frame).
// 3. Adaptive Bradley + Round Robin maintained.

        const translations = {
            uk: {
                menu_usage: "Як користуватися", 
                menu_tech: "Технологія", 
                menu_reset: "Скинути все", 
                menu_contact: "Скачати vCard",
                btn_save: "Зберегти PNG", 
                btn_camera: "Камера", 
                btn_gallery: "Галерея", 
                btn_close: "ЗАКРИТИ",
                ph_r: "RED CHANNEL", 
                ph_g: "GREEN CHANNEL", 
                ph_b: "BLUE CHANNEL",
                res_wait: "Сканування...", 
                res_fail: "[!] Помилка",
                status_no_qr: "НЕ БАЧУ QR-КОД",
                m_usage_title: "📝 Інструкція", 
                m_usage_body: "<p><b>1. Створення:</b> Введіть текст у поля R, G, B. Код сформується автоматично.</p><p><b>2. Сканування:</b> Натисніть 'Камера' та наведіть на кольоровий QR-код.</p><p><b>3. Результат:</b> Дані розподіляться по відповідних каналах.</p>",
                m_tech_title: "⚙️ Технологія", 
                m_tech_body: `<h3>Що вміє цей сайт?</h3><p>Він зчитує кольорові QR-коди з фізичного носія. Я написав програму — і вона працює.</p><h3>У чому суть методу?</h3><p>Раніше кольорові QR-коди не стали масовими, бо при друку фарби змішувалися і створювали «шум». Мій метод вирішує це на рівні фізики: спеціально підібрані пігменти не заважають один одному.</p><p><b>Результат:</b> кольоровий QR-код, який можна надрукувати і впевнено зчитати навіть з паперу.</p><hr><p>📄 Детальніше про фізику та підбір фарб — у дослідженні на <a href="https://doi.org/10.5281/zenodo.18895764" target="_blank" style="color: #0088FF;">Zenodo</a>.</p>`
            },
            en: {
                menu_usage: "How to use", menu_tech: "SCI Technology", menu_reset: "Reset All", menu_contact: "Download vCard",
                btn_save: "Save PNG", btn_camera: "Camera", btn_gallery: "Gallery", btn_close: "CLOSE",
                ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL",
                res_wait: "Scanning...", res_fail: "[!] Failed",
                status_no_qr: "NO QR CODE DETECTED",
                m_usage_title: "📝 Usage", 
                m_usage_body: "<p><b>1. Create:</b> Enter text into R, G, B fields. Code generates automatically.</p><p><b>2. Scan:</b> Tap 'Camera' and point at a color QR code.</p><p><b>3. Result:</b> Data fills into respective channels.</p>",
                m_tech_title: "⚙️ SCI Universal Model", 
                m_tech_body: "<p><b>SCI (Spectral Channel Integrity)</b> is a model for deterministic spectral response normalization, created by Mykhailo Kashkarov.</p><p>It enables reflective surfaces (like painted canvases) to act as stable data carriers by synchronizing pigment reflectance levels.</p><p><a href='https://zenodo.org/records/18895764' style='color:#0088FF'>Read Full Research on Zenodo</a></p>"
            }
        };

        const els = {
            r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'), mini: document.getElementById('mini-qr'),
            video: document.getElementById('video'), freeze: document.getElementById('freeze-frame'),
            centralContainer: document.getElementById('central-container'), flash: document.getElementById('flash-layer'),
            resultIndicators: document.getElementById('result-indicators'),
            resR: document.getElementById('res-r'), resG: document.getElementById('res-g'), resB: document.getElementById('res-b'),
            viewfinder: document.getElementById('viewfinder-ui'),
            statusLabel: document.getElementById('status-label'),
            dropdown: document.getElementById('dropdown')
        };

        let currentLang = 'uk';
        let scanning = false; // Only true for Camera mode
        let results = {r:null, g:null, b:null};
        let analysisReady = false;

        // --- SCANNER LOGIC ---
        
        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        
        const scannerStates = {
            r: { fails: 0, t: 15, s: 8, contrast: 1.1 },
            g: { fails: 0, t: 15, s: 8, contrast: 1.1 },
            b: { fails: 0, t: 15, s: 8, contrast: 1.1 }
        };
        
        let rrIndex = 0; 

        function applyBradleyAdaptive(imgData, chIdx, state) {
            const w = imgData.width, h = imgData.height;
            const input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            
            const t = state.t; 
            const s = Math.max(1, Math.floor(w / state.s)); 
            const contrast = state.contrast;

            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    let val = input[idx + chIdx];
                    val = ((val / 255.0 - 0.5) * contrast + 0.5) * 255.0;
                    if (val < 0) val = 0; if (val > 255) val = 255;
                    sum += val;
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                    const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1);
                    const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const val = input[(y * w + x) * 4 + chIdx];
                    const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                    const outIdx = (y * w + x) * 4;
                    output[outIdx] = output[outIdx+1] = output[outIdx+2] = res; 
                    output[outIdx+3] = 255;
                }
            }
            return output;
        }

        function updateScannerParams(state) {
            state.fails++;
            if (state.fails % 5 === 0) {
                state.t = 10 + Math.floor(Math.random() * 25); 
                state.s = 6 + Math.floor(Math.random() * 12);  
                state.contrast = 1.0 + (Math.random() * 0.5);   
            }
        }

        function processFrameRoundRobin() {
            // FIX: Removed 'if (!scanning)' check so it works for File uploads
            if (analysisReady) return;

            const w = offscreenCanvas.width;
            const h = offscreenCanvas.height;
            if (w === 0 || h === 0) return;

            const imageData = offscreenCtx.getImageData(0, 0, w, h);
            
            const targets = [];
            if (!results.r) targets.push({ch: 'r', idx: 0});
            if (!results.g) targets.push({ch: 'g', idx: 1});
            if (!results.b) targets.push({ch: 'b', idx: 2});

            if (targets.length === 0) {
                finishScan();
                return;
            }

            if (targets.length > 0) {
                rrIndex = (rrIndex + 1) % targets.length;
                const target = targets[rrIndex];
                
                const state = scannerStates[target.ch];
                const binaryData = applyBradleyAdaptive(imageData, target.idx, state);
                const code = jsQR(binaryData, w, h, { inversionAttempts: "attemptBoth" });
                
                if (code) {
                    results[target.ch] = code.data;
                    state.fails = 0; 
                    updateViewfinderState(getFoundCount());
                    
                    if (getFoundCount() === 3) {
                        finishScan();
                    }
                } else {
                    updateScannerParams(state);
                }
            }
        }

        function finishScan() {
            if(analysisReady) return;
            analysisReady = true;

            if (scanning) {
                // Camera mode: capture frame from video
                triggerCaptureSequence();
            } else {
                // File mode: frame is already in freeze-frame canvas
                // Just show animation
                startVisualizationSequence();
            }
        }

        function getFoundCount() {
            return (results.r?1:0) + (results.g?1:0) + (results.b?1:0);
        }

        function scanLoop() {
            if (!scanning) return;
            
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const vw = els.video.videoWidth, vh = els.video.videoHeight;
                const s = Math.min(vw, vh);
                offscreenCtx.drawImage(els.video, (vw-s)/2, (vh-s)/2, s, s, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
                processFrameRoundRobin();
            }
            requestAnimationFrame(scanLoop);
        }

        // --- ORIGINAL UI LOGIC ---

        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                els.main.style.opacity = 0.1;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            els.main.style.opacity = 1;
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            document.body.classList.remove('mode-camera');
            els.viewfinder.classList.add('hidden');
            
            let maxVer = 1;
            texts.forEach(t => {
                if(!t.trim()) return;
                const tmp = qrcode(0, 'M'); 
                tmp.addData(unescape(encodeURIComponent(t))); tmp.make();
                const v = Math.floor((tmp.getModuleCount() - 17) / 4);
                if (v > maxVer) maxVer = v;
            });
            
            const ctx = els.main.getContext('2d');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(maxVer, 'M'); 
                qr.addData(unescape(encodeURIComponent(text))); qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
                for (let r = 0; r < qr.getModuleCount(); r++) {
                    for (let c = 0; c < qr.getModuleCount(); c++) {
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                    }
                }
            });
            ctx.globalCompositeOperation = "source-over";
            document.getElementById('save-btn').classList.remove('hidden');
            els.mini.getContext('2d').drawImage(els.main, 0, 0, 32, 32);
        }

        function updateViewfinderState(count) {
            els.viewfinder.classList.remove('searching', 'tracking', 'progress');
            if (count === 0) {
                els.viewfinder.classList.add('searching');
                els.statusLabel.style.opacity = "1";
                els.statusLabel.textContent = translations[currentLang].status_no_qr;
            } else if (count < 3) {
                els.viewfinder.classList.add('progress');
                els.statusLabel.style.opacity = "0";
            } else {
                els.statusLabel.style.opacity = "0";
            }
        }

        function triggerCaptureSequence() {
            stopCamera();
            els.freeze.width = 480; els.freeze.height = 480;
            const fctx = els.freeze.getContext('2d');
            const vw = els.video.videoWidth, vh = els.video.videoHeight;
            const s = Math.min(vw, vh);
            fctx.drawImage(els.video, (vw-s)/2, (vh-s)/2, s, s, 0, 0, 480, 480);
            els.video.classList.add('hidden'); 
            els.freeze.classList.remove('hidden');
            startVisualizationSequence();
        }

        function startVisualizationSequence() {
            els.centralContainer.classList.add('scan-active');
            playSuccessSound();
            setTimeout(() => {
                els.flash.classList.add('flash-anim');
                setTimeout(() => {
                    els.flash.classList.remove('flash-anim');
                    els.centralContainer.classList.remove('scan-active');
                    els.viewfinder.classList.remove('targeting');
                    updateResultUI();
                }, 400);
            }, 2600);
        }

        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 2.5);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.5);
                gain.gain.setValueAtTime(0.05, now + 2.0);
                gain.gain.linearRampToValueAtTime(0, now + 2.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 2.6);
            } catch(e) {}
        }

        function updateResultUI() {
            els.resultIndicators.style.opacity = 1;
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                const indicator = el.querySelector('.indicator');
                const text = el.querySelector('span');
                if(results[ch]) {
                    text.textContent = results[ch];
                    indicator.className = 'indicator active-'+ch;
                    el.style.opacity = 1;
                    els[ch].value = results[ch];
                } else {
                    el.style.opacity = 0.4;
                    text.textContent = translations[currentLang].res_fail;
                }
            });
            generateQR();
            document.body.classList.remove('mode-camera');
        }

        async function startCamera() {
            globalReset(); 
            document.body.classList.add('mode-camera');
            els.viewfinder.classList.remove('hidden');
            els.resultIndicators.style.opacity = 0.7;
            
            offscreenCanvas.width = 480;
            offscreenCanvas.height = 480;
            
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
                els.video.srcObject = s; 
                els.video.play();
                els.video.classList.remove('hidden');
                els.main.style.opacity = 0;
                els.freeze.classList.add('hidden');
                scanning = true; 
                scanLoop();
            } catch(e) { alert("Camera Error: " + e); }
        }

        function stopCamera() {
            scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        }

        function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    prepareScannerUI();
                    
                    const s = 1024; 
                    offscreenCanvas.width = s; 
                    offscreenCanvas.height = s;
                    offscreenCtx.drawImage(img, 0, 0, s, s);
                    
                    els.freeze.width = 480; els.freeze.height = 480;
                    els.freeze.getContext('2d').drawImage(offscreenCanvas, 0, 0, 480, 480);
                    els.freeze.classList.remove('hidden'); 
                    els.video.classList.add('hidden');
                    els.main.style.opacity = 0;
                    
                    // Run scanner loop manually for file
                    let attempts = 0;
                    const interval = setInterval(() => {
                        if (analysisReady || attempts > 40) { // Slightly more attempts for static image
                            clearInterval(interval);
                            if(!analysisReady) updateResultUI(); 
                            return;
                        }
                        processFrameRoundRobin();
                        attempts++;
                    }, 50);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setLanguage(l) {
            currentLang = l;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[l][key]) el.textContent = translations[l][key];
            });
            els.r.placeholder = translations[l].ph_r;
            els.g.placeholder = translations[l].ph_g;
            els.b.placeholder = translations[l].ph_b;
            
            if (els.statusLabel.style.opacity === "1") {
                els.statusLabel.textContent = translations[l].status_no_qr;
            }
        }

        function prepareScannerUI() {
            results = {r:null, g:null, b:null}; analysisReady = false;
            ['r', 'g', 'b'].forEach(ch => {
                scannerStates[ch] = { fails: 0, t: 15, s: 8, contrast: 1.1 };
            });
            rrIndex = 0;

            els.main.style.opacity = 0;
            els.resultIndicators.style.opacity = 0;
            els.centralContainer.classList.remove('scan-active');
            els.viewfinder.classList.add('searching'); 
            els.statusLabel.style.opacity = "1";
        }

        function globalReset() {
            stopCamera(); 
            els.r.value = ""; els.g.value = ""; els.b.value = "";
            results = {r:null, g:null, b:null}; 
            analysisReady = false;
            
            ['r', 'g', 'b'].forEach(ch => {
                scannerStates[ch] = { fails: 0, t: 15, s: 8, contrast: 1.1 };
            });
            
            generateQR(); 
            els.resultIndicators.style.opacity = 0;
            els.centralContainer.classList.remove('scan-active');
            els.main.classList.remove('hidden'); 
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            els.viewfinder.classList.add('hidden');
            els.viewfinder.classList.remove('searching', 'tracking', 'progress');
            document.body.classList.remove('mode-camera');
        }

        function openModal(t) {
            document.getElementById('modal-title').textContent = translations[currentLang]['m_'+t+'_title'];
            document.getElementById('modal-body').innerHTML = translations[currentLang]['m_'+t+'_body'];
            document.getElementById('modal-overlay').classList.add('show');
            els.dropdown.classList.remove('show');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
        function triggerFileInput() { document.getElementById('file-input').click(); }
        function saveQR() { const a = document.createElement('a'); a.download = 'RGB11_Result.png'; a.href = els.main.toDataURL(); a.click(); }

        // Event Listeners
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
        document.getElementById('menu-btn').onclick = (e) => { 
            e.stopPropagation(); 
            els.dropdown.classList.toggle('show'); 
        };
        document.onclick = () => els.dropdown.classList.remove('show');
        
        // Init
        setLanguage('uk');
        generateQR();
    </script>
</body>
</html>
